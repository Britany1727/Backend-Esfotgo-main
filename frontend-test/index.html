<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESFOT Map 360 - Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; }
        
        #sidebar {
            width: 380px; min-width: 380px; background: #1a1a2e; color: #fff;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #sidebar-header {
            padding: 20px; background: #16213e; text-align: center;
            border-bottom: 2px solid #0f3460;
        }
        #sidebar-header h1 { font-size: 18px; color: #e94560; }
        #sidebar-header p { font-size: 12px; color: #aaa; margin-top: 4px; }
        
        #search-box { padding: 15px; }
        #search-box input {
            width: 100%; padding: 10px 14px; border: none; border-radius: 8px;
            background: #16213e; color: #fff; font-size: 14px; outline: none;
        }
        #search-box input::placeholder { color: #666; }
        
        #results { flex: 1; overflow-y: auto; padding: 0 15px 15px; }
        .result-item {
            background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 8px;
            cursor: pointer; transition: 0.2s; border-left: 3px solid transparent;
        }
        .result-item:hover { background: #0f3460; border-left-color: #e94560; }
        .result-item .title { font-weight: 600; font-size: 14px; }
        .result-item .sub { font-size: 12px; color: #aaa; margin-top: 2px; }
        .result-item .badge {
            display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px;
            margin-top: 4px; background: #0f3460; color: #e94560;
        }
        
        #route-info {
            background: #16213e; padding: 15px; border-top: 2px solid #0f3460;
            display: none;
        }
        #route-info .title { font-size: 14px; color: #e94560; font-weight: 600; }
        #route-info .stats { display: flex; gap: 20px; margin-top: 8px; font-size: 13px; }
        #route-info .stats span { color: #aaa; }
        #route-info .stats strong { color: #fff; }
        #route-info button {
            width: 100%; margin-top: 10px; padding: 8px; border: none; border-radius: 6px;
            background: #e94560; color: #fff; cursor: pointer; font-weight: 600;
        }
        #route-info button:hover { background: #d63851; }
        
        #map { flex: 1; height: 100vh; }
        
        .leaflet-popup-content-wrapper {
            background: #1a1a2e !important; color: #fff !important; border-radius: 8px !important;
        }
        .leaflet-popup-tip { background: #1a1a2e !important; }
        .leaflet-popup-content { margin: 10px 14px !important; font-size: 13px !important; }

        .custom-marker {
            width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }
        .marker-aula { background: #4CAF50; }
        .marker-laboratorio { background: #e94560; }
        .marker-oficina { background: #2196F3; }
        .marker-evento { background: #FF9800; }
        .marker-user { background: #E91E63; }
        
        .leaflet-control-zoom a { background: #1a1a2e !important; color: #fff !important; }
        
        .loading {
            text-align: center; padding: 30px; color: #666; font-size: 13px;
        }
        .loading::after {
            content: ''; display: inline-block; width: 20px; height: 20px;
            border: 2px solid #e94560; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-left: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <h1>ESFOT MAP 360</h1>
            <p>Navegación inteligente del campus</p>
        </div>
        <div id="search-box">
            <input type="text" id="searchInput" placeholder="Buscar aula, laboratorio u oficina..." />
        </div>
        <div id="results"></div>
        <div id="route-info">
            <div class="title">Ruta óptima</div>
            <div class="stats">
                <span>Distancia: <strong id="routeDist">0 m</strong></span>
                <span>Tiempo: <strong id="routeTime">0 min</strong></span>
            </div>
            <button id="clearRoute">Limpiar ruta</button>
        </div>
    </div>
    <div id="map"></div>

    <script>
        const API = 'http://localhost:3000/api';
        const map = L.map('map', { zoomControl: true }).setView([-0.2115, -78.4920], 18);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20, attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let userMarker = null;
        let routeLine = null;
        let routeNodes = [];
        let allPoints = [];
        let edificiosLayer = L.layerGroup().addTo(map);
        let pointsLayer = L.layerGroup().addTo(map);

        document.getElementById('clearRoute').onclick = clearRoute;

        // Cargar área ESFOT (polígonos de edificios)
        async function cargarAreaEsfot() {
            try {
                const res = await fetch(`${API}/mapa/area`);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const edificios = await res.json();
                
                for (const ed of edificios) {
                    if (ed.poligono && ed.poligono.coordinates) {
                        const coords = ed.poligono.coordinates[0].map(c => [c[1], c[0]]);
                        const polygon = L.polygon(coords, {
                            color: '#ff6b81',
                            fillColor: '#e94560',
                            fillOpacity: 0.15,
                            weight: 3,
                            dashArray: '8, 6'
                        }).addTo(edificiosLayer);
                        
                        polygon.bindPopup(`
                            <b>${ed.nombre}</b><br>
                            <span style="color:#aaa">${ed.descripcion || ''}</span><br>
                            <span style="color:#e94560">${ed.pisos} pisos</span>
                        `);
                    }
                    
                    if (ed.centro && ed.centro.coordinates) {
                        L.circleMarker([ed.centro.coordinates[1], ed.centro.coordinates[0]], {
                            radius: 8, color: '#ff6b81', fillColor: '#fff', fillOpacity: 1, weight: 3
                        }).addTo(edificiosLayer)
                          .bindPopup(`<b>${ed.nombre}</b>`);
                    }
                }
            } catch (e) {
                console.error('Error cargando área ESFOT:', e);
                document.getElementById('results').innerHTML = `<div style="color:#e94560;padding:20px;text-align:center">
                    ❌ No se pudo conectar al backend<br>
                    <small>${e.message}</small><br><br>
                    <button onclick="location.reload()" style="background:#e94560;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer">Reintentar</button>
                </div>`;
            }
        }

        // Cargar puntos del mapa
        async function cargarPuntos() {
            try {
                const res = await fetch(`${API}/mapa/puntos`);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                allPoints = await res.json();
                
                for (const p of allPoints) {
                    if (!p.coordenadas?.lat || !p.coordenadas?.lng) continue;
                    
                    const colorClass = p.modelo === 'Aula' 
                        ? (p.tipo === 'laboratorio' ? 'marker-laboratorio' : 'marker-aula')
                        : p.modelo === 'Oficina' ? 'marker-oficina' : 'marker-evento';
                    
                    const icon = L.divIcon({
                        className: 'custom-marker ' + colorClass,
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });
                    
                    const marker = L.marker([p.coordenadas.lat, p.coordenadas.lng], { icon }).addTo(pointsLayer);
                    
                    let popupHtml = `<b>${p.nombre}</b><br>`;
                    if (p.imagen) popupHtml += `<img src="${p.imagen}" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin:6px 0" onerror="this.style.display='none'"><br>`;
                    if (p.ubicacion) popupHtml += `<span style="color:#aaa">${p.ubicacion}</span><br>`;
                    if (p.edificio?.nombre) popupHtml += `<span style="color:#888">Edificio: ${p.edificio.nombre}</span><br>`;
                    if (p.piso) popupHtml += `<span style="color:#888">Piso: ${p.piso}</span><br>`;
                    if (p.encargado) popupHtml += `<span style="color:#888">🧑‍💼 ${p.encargado}</span><br>`;
                    if (p.telefono) popupHtml += `<span style="color:#888">📞 ${p.telefono}</span><br>`;
                    popupHtml += `<br><button onclick="navegarAHacia('${p._id}', '${p.modelo}')" 
                        style="background:#e94560;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">
                        Navegar aquí</button>`;
                    
                    marker.bindPopup(popupHtml);
                    marker._puntoId = p._id;
                    marker._puntoModelo = p.modelo;
                    marker._puntoNombre = p.nombre;
                }
            } catch (e) {
                console.error('Error cargando puntos:', e);
            }
        }

        // Buscar destinos
        let searchTimeout;
        document.getElementById('searchInput').oninput = function() {
            clearTimeout(searchTimeout);
            const q = this.value.trim();
            if (q.length < 2) { document.getElementById('results').innerHTML = '<div class="loading">Escribe al menos 2 caracteres</div>'; return; }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${API}/mapa/buscar?q=${encodeURIComponent(q)}`);
                    const data = await res.json();
                    mostrarResultados(data);
                } catch (e) {
                    document.getElementById('results').innerHTML = '<div style="color:#e94560;padding:20px;text-align:center">Error de conexión con el backend</div>';
                }
            }, 300);
        };

        function mostrarResultados(data) {
            const container = document.getElementById('results');
            if (!data.length) {
                container.innerHTML = '<div style="color:#666;padding:20px;text-align:center">Sin resultados</div>';
                return;
            }
            container.innerHTML = data.map(p => `
                <div class="result-item" onclick="navegarAHacia('${p._id}', '${p.modelo}')">
                    <div class="title">${p.nombre}</div>
                    <div class="sub">${p.edificio ? p.edificio + ' - ' : ''}${p.ubicacion || ''}</div>
                    <span class="badge">${p.modelo} ${p.piso ? '· Piso ' + p.piso : ''}</span>
                </div>
            `).join('');
        }

        // Navegación
        async function navegarAHacia(destinoId, destinoModelo) {
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización');
                return;
            }

            document.getElementById('route-info').style.display = 'block';
            document.getElementById('routeDist').textContent = 'Calculando...';
            document.getElementById('routeTime').textContent = '...';

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([latitude, longitude], {
                    radius: 8, color: '#E91E63', fillColor: '#E91E63', fillOpacity: 0.8, weight: 2
                }).addTo(map).bindPopup('Tu ubicación');
                map.setView([latitude, longitude], 18);

                try {
                    const url = `${API}/mapa/ruta?origenLat=${latitude}&origenLng=${longitude}&destinoId=${destinoId}&destinoTipo=${destinoModelo}`;
                    const res = await fetch(url);
                    const ruta = await res.json();

                    if (ruta.nodos && ruta.nodos.length > 0) {
                        routeNodes = ruta.nodos;
                        
                        if (routeLine) map.removeLayer(routeLine);
                        
                        const coordenadas = ruta.nodos
                            .map(n => n.coordenadas ? [n.coordenadas.lat, n.coordenadas.lng] : null)
                            .filter(Boolean);
                        
                        if (coordenadas.length > 0) {
                            routeLine = L.polyline(coordenadas, {
                                color: '#e94560', weight: 4, opacity: 0.9,
                                dashArray: '10, 6'
                            }).addTo(map);
                            
                            // Flechas de dirección
                            const midIdx = Math.floor(coordenadas.length / 2);
                            if (coordenadas.length > 1) {
                                const mid = coordenadas[midIdx] || coordenadas[0];
                                const prev = coordenadas[midIdx - 1] || coordenadas[0];
                                const angle = Math.atan2(mid[0] - prev[0], mid[1] - prev[1]) * 180 / Math.PI;
                                L.marker(mid, {
                                    icon: L.divIcon({
                                        html: `<div style="transform:rotate(${angle}deg);font-size:22px;color:#e94560">➤</div>`,
                                        className: '', iconSize: [22, 22], iconAnchor: [11, 11]
                                    })
                                }).addTo(map);
                            }

                            map.fitBounds(routeLine.getBounds().pad(0.2));
                        }
                        
                        const dist = ruta.distanciaTotal || 0;
                        document.getElementById('routeDist').textContent = dist < 1000 ? `${dist} m` : `${(dist/1000).toFixed(1)} km`;
                        document.getElementById('routeTime').textContent = ruta.duracionEstimada ? `${ruta.duracionEstimada} min` : '<1 min';
                        
                        // Popup con instrucciones
                        if (ruta.nodos.length > 1) {
                            const dest = ruta.nodos[ruta.nodos.length - 1];
                            const pasos = ruta.nodos.map((n, i) => {
                                if (i === 0) return `📍 Inicio: ${n.nombre || 'Tu ubicación'}`;
                                if (i === ruta.nodos.length - 1) return `🏁 Destino: ${n.nombre || 'Llegaste'}`;
                                return `➡️ ${n.nombre || 'Sigue recto'}`;
                            }).join('<br>');
                            
                            L.popup({ maxWidth: 300 })
                                .setLatLng(coordenadas[Math.min(2, coordenadas.length - 1)])
                                .setContent(`<b>Instrucciones</b><br><small>${pasos}</small>`)
                                .openOn(map);
                        }
                    } else {
                        document.getElementById('routeDist').textContent = 'No disponible';
                        document.getElementById('routeTime').textContent = '-';
                        alert(ruta.msg || 'No se encontró ruta');
                    }
                } catch (e) {
                    console.error('Error en ruta:', e);
                    document.getElementById('routeDist').textContent = 'Error';
                    document.getElementById('routeTime').textContent = '-';
                }
            }, () => {
                alert('No se pudo obtener tu ubicación. Activa el GPS.');
                document.getElementById('route-info').style.display = 'none';
            });
        }

        // Función global para usar desde popups
        window.navegarAHacia = navegarAHacia;

        function clearRoute() {
            if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
            if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
            routeNodes = [];
            document.getElementById('route-info').style.display = 'none';
            map.setView([-0.2109, -78.4909], 17);
        }

        // Inicializar
        cargarAreaEsfot();
        cargarPuntos();
    </script>
</body>
</html>
